name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths: [init.sh]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Deploy welcome.sh to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git fetch origin gh-pages:gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          git checkout main -- init.sh
          cp init.sh welcome.sh
          rm init.sh

          echo "get.simplemotion.global" > CNAME

          git add welcome.sh CNAME
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "Deploy welcome.sh from main" && git push origin gh-pages)
