name: Welcome Email
on:
  workflow_dispatch:
    inputs:
      email:
        description: 'New member email'
        required: true
      name:
        description: 'New member name'
        required: true

jobs:
  send-welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Get access token
        id: auth
        run: |
          TOKEN=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials" | jq -r '.access_token')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Send welcome email
        run: |
          curl -s -X POST \
            "https://graph.microsoft.com/v1.0/users/greg.gowans@simplemotion.global/sendMail" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{
              "message": {
                "subject": "Welcome to SimpleGlobal — Setup Complete",
                "body": {
                  "contentType": "HTML",
                  "content": "<h2>Welcome, ${{ inputs.name }}!</h2><p>Your Claude Code environment has been set up successfully.</p><p><strong>Next steps:</strong></p><ul><li>Open Terminal and type <code>sm</code> to launch Claude Code</li><li>Run <code>/sg-orgs --sync-folders</code> to pull the org structure</li><li>Run <code>/sg-mcp --auth</code> when ready to authenticate MCP integrations</li></ul><p>See the <a href=\"https://github.com/simpleglobal/.sg-welcome\">setup repo</a> for full documentation.</p><p>If you have questions, reply to this email.</p><p>Kind Regards,<br>SimpleGlobal Onboarding</p>"
                },
                "toRecipients": [
                  { "emailAddress": { "address": "${{ inputs.email }}" } }
                ]
              }
            }'
