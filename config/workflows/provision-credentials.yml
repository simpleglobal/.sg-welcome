name: Provision MCP Credentials

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Build credential manifest
        env:
          # M365 base credentials (per profile)
          SM_M365_CLIENT_ID: ${{ secrets.SM_M365_CLIENT_ID }}
          SM_M365_TENANT_ID: ${{ secrets.SM_M365_TENANT_ID }}
          SM_M365_USER_ID: ${{ secrets.SM_M365_USER_ID }}
          SM_M365_CERTIFICATE: ${{ secrets.SM_M365_CERTIFICATE }}
          SM_M365_PRIVATE_KEY: ${{ secrets.SM_M365_PRIVATE_KEY }}
          SM_M365_THUMBPRINT: ${{ secrets.SM_M365_THUMBPRINT }}
          SG_M365_CLIENT_ID: ${{ secrets.SG_M365_CLIENT_ID }}
          SG_M365_TENANT_ID: ${{ secrets.SG_M365_TENANT_ID }}
          SG_M365_USER_ID: ${{ secrets.SG_M365_USER_ID }}
          SG_M365_CERTIFICATE: ${{ secrets.SG_M365_CERTIFICATE }}
          SG_M365_PRIVATE_KEY: ${{ secrets.SG_M365_PRIVATE_KEY }}
          SG_M365_THUMBPRINT: ${{ secrets.SG_M365_THUMBPRINT }}
          # Xero credentials (per profile)
          SP_XERO_CLIENT_ID: ${{ secrets.SP_XERO_CLIENT_ID }}
          SP_XERO_CLIENT_SECRET: ${{ secrets.SP_XERO_CLIENT_SECRET }}
          SM_XERO_CLIENT_ID: ${{ secrets.SM_XERO_CLIENT_ID }}
          SM_XERO_CLIENT_SECRET: ${{ secrets.SM_XERO_CLIENT_SECRET }}
          SA_XERO_CLIENT_ID: ${{ secrets.SA_XERO_CLIENT_ID }}
          SA_XERO_CLIENT_SECRET: ${{ secrets.SA_XERO_CLIENT_SECRET }}
          SI_XERO_CLIENT_ID: ${{ secrets.SI_XERO_CLIENT_ID }}
          SI_XERO_CLIENT_SECRET: ${{ secrets.SI_XERO_CLIENT_SECRET }}
          SE_XERO_CLIENT_ID: ${{ secrets.SE_XERO_CLIENT_ID }}
          SE_XERO_CLIENT_SECRET: ${{ secrets.SE_XERO_CLIENT_SECRET }}
        run: |
          python3 << 'PYEOF'
          import os, json

          # Mapping: env var suffix → Keychain key suffix
          M365_FIELDS = {
              "CLIENT_ID": "Client-ID",
              "TENANT_ID": "Tenant-ID",
              "USER_ID": "User-ID",
              "CERTIFICATE": "Certificate",
              "PRIVATE_KEY": "Private-Key",
              "THUMBPRINT": "Thumbprint",
          }
          XERO_FIELDS = {
              "CLIENT_ID": "Client-ID",
              "CLIENT_SECRET": "Client-Secret",
          }

          manifest = {"m365": {}, "xero": {}}

          # M365 profiles
          for profile in ["SM", "SG"]:
              entries = {}
              for env_suffix, key_suffix in M365_FIELDS.items():
                  val = os.environ.get(f"{profile}_M365_{env_suffix}", "")
                  if val:
                      entries[key_suffix] = val
              if entries:
                  manifest["m365"][profile] = entries

          # Xero profiles
          for profile in ["SP", "SM", "SA", "SI", "SE"]:
              entries = {}
              for env_suffix, key_suffix in XERO_FIELDS.items():
                  val = os.environ.get(f"{profile}_XERO_{env_suffix}", "")
                  if val:
                      entries[key_suffix] = val
              if entries:
                  manifest["xero"][profile] = entries

          # Remove empty services
          manifest = {k: v for k, v in manifest.items() if v}

          with open("credentials.json", "w") as f:
              json.dump(manifest, f, indent=2)

          m365_count = sum(len(v) for v in manifest.get("m365", {}).values())
          xero_count = sum(len(v) for v in manifest.get("xero", {}).values())
          print(f"Manifest built: {m365_count} M365 fields, {xero_count} Xero fields")
          PYEOF

      - name: Upload credential manifest
        uses: actions/upload-artifact@v4
        with:
          name: mcp-credentials
          path: credentials.json
          retention-days: 1
          if-no-files-found: error
