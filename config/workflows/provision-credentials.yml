name: Provision MCP Credentials

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Build credential TOML files
        env:
          # M365 credentials (per profile)
          SM_M365_LABEL: ${{ secrets.SM_M365_LABEL }}
          SM_M365_CLIENT_ID: ${{ secrets.SM_M365_CLIENT_ID }}
          SM_M365_TENANT_ID: ${{ secrets.SM_M365_TENANT_ID }}
          SM_M365_USER_ID: ${{ secrets.SM_M365_USER_ID }}
          SM_M365_CERT_THUMBPRINT: ${{ secrets.SM_M365_CERT_THUMBPRINT }}
          SM_M365_CERT_KEY: ${{ secrets.SM_M365_CERT_KEY }}
          SM_M365_CERT: ${{ secrets.SM_M365_CERT }}
          SG_M365_LABEL: ${{ secrets.SG_M365_LABEL }}
          SG_M365_CLIENT_ID: ${{ secrets.SG_M365_CLIENT_ID }}
          SG_M365_TENANT_ID: ${{ secrets.SG_M365_TENANT_ID }}
          SG_M365_USER_ID: ${{ secrets.SG_M365_USER_ID }}
          SG_M365_CERT_THUMBPRINT: ${{ secrets.SG_M365_CERT_THUMBPRINT }}
          SG_M365_CERT_KEY: ${{ secrets.SG_M365_CERT_KEY }}
          SG_M365_CERT: ${{ secrets.SG_M365_CERT }}
          # Xero credentials (per profile)
          SP_XERO_LABEL: ${{ secrets.SP_XERO_LABEL }}
          SP_XERO_CLIENT_ID: ${{ secrets.SP_XERO_CLIENT_ID }}
          SP_XERO_CLIENT_SECRET: ${{ secrets.SP_XERO_CLIENT_SECRET }}
          SM_XERO_LABEL: ${{ secrets.SM_XERO_LABEL }}
          SM_XERO_CLIENT_ID: ${{ secrets.SM_XERO_CLIENT_ID }}
          SM_XERO_CLIENT_SECRET: ${{ secrets.SM_XERO_CLIENT_SECRET }}
          SA_XERO_LABEL: ${{ secrets.SA_XERO_LABEL }}
          SA_XERO_CLIENT_ID: ${{ secrets.SA_XERO_CLIENT_ID }}
          SA_XERO_CLIENT_SECRET: ${{ secrets.SA_XERO_CLIENT_SECRET }}
          SI_XERO_LABEL: ${{ secrets.SI_XERO_LABEL }}
          SI_XERO_CLIENT_ID: ${{ secrets.SI_XERO_CLIENT_ID }}
          SI_XERO_CLIENT_SECRET: ${{ secrets.SI_XERO_CLIENT_SECRET }}
          SE_XERO_LABEL: ${{ secrets.SE_XERO_LABEL }}
          SE_XERO_CLIENT_ID: ${{ secrets.SE_XERO_CLIENT_ID }}
          SE_XERO_CLIENT_SECRET: ${{ secrets.SE_XERO_CLIENT_SECRET }}
        run: |
          python3 << 'PYEOF'
          import os

          def quote(val):
              """TOML-quote a value. Multi-line strings use triple quotes."""
              if "\n" in val:
                  return f'"""\n{val}"""'
              return f'"{val}"'

          def build_m365_toml():
              lines = ["# M365 MCP Credentials", "# Generated by provision-credentials workflow", ""]
              found = False
              for profile in ["SM", "SG"]:
                  client_id = os.environ.get(f"{profile}_M365_CLIENT_ID", "")
                  if not client_id:
                      continue
                  found = True
                  label = os.environ.get(f"{profile}_M365_LABEL", profile)
                  lines.append(f"[profiles.{profile}]")
                  lines.append(f"label = {quote(label)}")
                  lines.append(f"client_id = {quote(client_id)}")
                  tenant_id = os.environ.get(f"{profile}_M365_TENANT_ID", "")
                  if tenant_id:
                      lines.append(f"tenant_id = {quote(tenant_id)}")
                  user_id = os.environ.get(f"{profile}_M365_USER_ID", "")
                  if user_id:
                      lines.append(f"user_id = {quote(user_id)}")
                  thumbprint = os.environ.get(f"{profile}_M365_CERT_THUMBPRINT", "")
                  if thumbprint:
                      lines.append(f"cert_thumbprint = {quote(thumbprint)}")
                  cert_key = os.environ.get(f"{profile}_M365_CERT_KEY", "")
                  if cert_key:
                      lines.append(f"cert_key = {quote(cert_key)}")
                  cert = os.environ.get(f"{profile}_M365_CERT", "")
                  if cert:
                      lines.append(f"cert = {quote(cert)}")
                  lines.append("")
              if found:
                  with open("sg-mcp-m365.toml", "w") as f:
                      f.write("\n".join(lines))
                  print(f"Built sg-mcp-m365.toml")
              return found

          def build_xero_toml():
              lines = ["# Xero MCP Credentials", "# Generated by provision-credentials workflow", ""]
              found = False
              for profile in ["SP", "SM", "SA", "SI", "SE"]:
                  client_id = os.environ.get(f"{profile}_XERO_CLIENT_ID", "")
                  if not client_id:
                      continue
                  found = True
                  label = os.environ.get(f"{profile}_XERO_LABEL", profile)
                  lines.append(f"[profiles.{profile}]")
                  lines.append(f"label = {quote(label)}")
                  lines.append(f"client_id = {quote(client_id)}")
                  client_secret = os.environ.get(f"{profile}_XERO_CLIENT_SECRET", "")
                  if client_secret:
                      lines.append(f"client_secret = {quote(client_secret)}")
                  lines.append("")
              if found:
                  with open("sg-mcp-xero.toml", "w") as f:
                      f.write("\n".join(lines))
                  print(f"Built sg-mcp-xero.toml")
              return found

          m365 = build_m365_toml()
          xero = build_xero_toml()

          if not m365 and not xero:
              print("WARNING: No credentials found. Set secrets on this repo first.")
          PYEOF

      - name: Upload M365 credentials
        if: hashFiles('sg-mcp-m365.toml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sg-mcp-m365
          path: sg-mcp-m365.toml
          retention-days: 1

      - name: Upload Xero credentials
        if: hashFiles('sg-mcp-xero.toml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sg-mcp-xero
          path: sg-mcp-xero.toml
          retention-days: 1
